<!DOCTYPE html>
<html>
    <head>
        <style>
            html, body {
                background-color: transparent !important;
                background: transparent !important;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
        </style>
        <link rel="stylesheet" href="style.css">
        <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    </head>
    <body>
        <div id="vbox-container" style="display: none;">
            <div class="glass-panel">
                <div class="header">VBOX v1.0 // <span id="status" style="color: #00f2ff;">STANDBY</span></div>
                
                <div class="gauge-box">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__background" stroke="#222" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
                        <circle id="speed-arc" class="progress-ring__circle" stroke="#00f2ff" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
                    </svg>
                    <div class="speed-text">
                        <h1 id="speed">0</h1>
                        <p>MPH</p>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-row">0-60 <span id="zero60">0.00s</span></div>
                    <div class="stat-row highlight">BEST <span id="best">0.00s</span></div>
                    <div class="stat-row">80-110 <span id="hundred200">0.00s</span></div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
